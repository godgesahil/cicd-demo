<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CircleCI Deployment Test</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(to right, #4facfe, #00f2fe);
            color: white;
            text-align: center;
            padding-top: 100px;
        }
        h1 {
            font-size: 3rem;
        }
        p {
            font-size: 1.2rem;
        }
        .box {
            background: rgba(0, 0, 0, 0.2);
            padding: 20px;
            border-radius: 10px;
            display: inline-block;
        }
    </style>
</head>
<body>
    <div class="box">
        <h1>🚀 Deployment Successful!</h1>
        <p>This page is deployed using CircleCI.</p>
        <p id="time"></p>
    </div>

    <script>
        document.getElementById("time").innerText =
            "Deployed at: " + new Date().toLocaleString();
    </script>
</body>
</html>
